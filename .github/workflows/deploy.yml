name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: sistem-analizi/ci/.github/workflows/deploy.yml@v1
    with:
      build_type: node
      year: '2026'
      node_version: '20'
      build_command: npm run build
      output_dir: dist                  # Vite default çıktı klasörü
      clean_slate: true

      forward_secrets: >
        VITE_FIREBASE_API_KEY,
        VITE_FIREBASE_AUTH_DOMAIN,
        VITE_FIREBASE_DATABASE_URL,
        VITE_FIREBASE_PROJECT_ID,
        VITE_FIREBASE_STORAGE_BUCKET,
        VITE_FIREBASE_MESSAGING_SENDER_ID,
        VITE_FIREBASE_APP_ID

    secrets: inherit
